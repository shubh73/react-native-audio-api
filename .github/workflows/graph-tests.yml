name: Graph Tests
on:
  pull_request:
    paths:
      - 'packages/react-native-audio-api/common/cpp/audioapi/core/utils/graph/**'
      - 'packages/react-native-audio-api/common/cpp/test/src/graph/**'

jobs:
  graph-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: yarn test:graph
